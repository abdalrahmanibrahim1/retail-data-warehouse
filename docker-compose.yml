services:
  db:
    image: postgres:16
    container_name: retail_dw_postgres
    environment:
      POSTGRES_DB: retail_data_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retail_data_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: retail_dw_pipeline
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: retail_data_warehouse
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
    command: ["python", "-m", "src.main"]

volumes:
  postgres_data: